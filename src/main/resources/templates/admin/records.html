<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>檔案資料管理 - HobbySwap ADMIN</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .file-container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        h1, h2 { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .info-box { background: #fffae6; border: 2px solid #000; padding: 15px 20px; margin-bottom: 25px;
                    font-family: 'Space Mono', monospace; line-height: 1.7; }
        .info-box code { background: #000; color: #fff; padding: 2px 6px; }
        .add-box { border: 3px dashed #000; padding: 20px; margin-bottom: 35px; background: #f7f7f7; }
        .record-card { border: 2px solid #000; box-shadow: 5px 5px 0 #000; padding: 18px; margin-bottom: 18px; background: #fff; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
        label { display: block; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 4px;
                font-family: 'Space Mono', monospace; }
        input[type=text] { border: 2px solid #000; padding: 8px; font-family: 'Space Mono', monospace;
                           width: 100%; box-sizing: border-box; }
        .field { flex: 1; min-width: 150px; }
        .btn-save { background: #000; color: #fff; border: 2px solid #000; padding: 9px 18px; cursor: pointer; font-weight: bold; }
        .btn-del { background: #fff; color: red; border: 2px solid red; padding: 7px 14px; cursor: pointer; font-weight: bold; }
        .meta { font-size: 0.75rem; color: #666; font-family: 'Space Mono', monospace; margin-top: 8px; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/" class="logo">HobbySwap ADMIN</a>
    <div class="nav-links">
        <a th:href="@{/admin/dashboard}" class="btn">← 回後台</a>
    </div>
</div>

<div class="file-container">
    <h1>🗂️ 檔案資料管理</h1>

    <div class="info-box">
        本頁所有資料 <strong>完全儲存於純文字檔</strong> <code>data/records.csv</code>，<strong>不經過資料庫</strong>。<br>
        以 Java 原生檔案 I/O (BufferedReader / BufferedWriter) 示範
        <strong>寫入(新增) / 讀取(列表) / 修改 / 刪除</strong>。
    </div>

    <!-- ===== 寫入 (新增) ===== -->
    <div class="add-box">
        <h2 style="margin-top: 0; font-size: 1.2rem;">➕ 新增一筆 (寫入檔案)</h2>
        <form th:action="@{/admin/records/add}" method="post">
            <div class="row">
                <div class="field">
                    <label>名稱 *</label>
                    <input type="text" name="name" required placeholder="例如：二手吉他">
                </div>
                <div class="field">
                    <label>分類</label>
                    <input type="text" name="category" placeholder="例如：樂器">
                </div>
                <div class="field" style="flex: 2;">
                    <label>備註</label>
                    <input type="text" name="note" placeholder="例如：9 成新，附琴袋">
                </div>
                <button type="submit" class="btn-save">寫入檔案</button>
            </div>
        </form>
    </div>

    <!-- ===== 讀取 + 修改 + 刪除 ===== -->
    <h2 style="font-size: 1.2rem;">📄 檔案內容 (<span th:text="${#lists.size(records)}">0</span> 筆)</h2>

    <div th:if="${#lists.isEmpty(records)}" style="color: #888; font-family: 'Space Mono', monospace;">
        檔案目前是空的，從上方新增第一筆資料吧。
    </div>

    <div th:each="r : ${records}" class="record-card">
        <form th:action="@{'/admin/records/' + ${r.id} + '/update'}" method="post">
            <div class="row">
                <div class="field" style="max-width: 70px; flex: 0;">
                    <label>ID</label>
                    <input type="text" th:value="${r.id}" disabled style="background: #eee;">
                </div>
                <div class="field">
                    <label>名稱</label>
                    <input type="text" name="name" th:value="${r.name}" required>
                </div>
                <div class="field">
                    <label>分類</label>
                    <input type="text" name="category" th:value="${r.category}">
                </div>
                <div class="field" style="flex: 2;">
                    <label>備註</label>
                    <input type="text" name="note" th:value="${r.note}">
                </div>
                <button type="submit" class="btn-save">儲存修改</button>
            </div>
        </form>

        <div class="meta">
            最後修改：<span
                th:text="${r.updatedAt != null ? #temporals.format(r.updatedAt, 'yyyy-MM-dd HH:mm:ss') : '—'}">—</span>
        </div>

        <form th:action="@{'/admin/records/' + ${r.id} + '/delete'}" method="post" style="margin-top: 10px;">
            <button type="submit" class="btn-del"
                    onclick="return confirm('確定要從檔案刪除這筆資料嗎？')">🗑️ 刪除</button>
        </form>
    </div>
</div>

</body>
</html>
